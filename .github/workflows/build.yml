name: Build & Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version field to bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    name: Bump version in pyproject.toml
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          sed -i "0,/^version = \".*\"/s//version = \"$NEW_VERSION\"/" pyproject.toml

      - name: Commit bumped version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

  build:
    name: Build — ${{ matrix.os-label }}
    needs: bump-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-label: Linux x86_64
            artifact-name: mkobbcode-linux-x86_64
            binary-path: dist/mkobbcode-linux-x86_64

          - os: windows-latest
            os-label: Windows x64
            artifact-name: mkobbcode-windows-x64.exe
            binary-path: dist\mkobbcode-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout (after version bump)
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libegl1 libxkbcommon0 libfontconfig1

      - name: Install project + dev deps (via uv.lock)
        run: uv sync --dev

      - name: Build with PyInstaller
        run: uv run python .github/build.py

      - name: Rename binary (Linux)
        if: runner.os == 'Linux'
        run: mv dist/mkobbcode dist/mkobbcode-linux-x86_64

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: Move-Item dist\mkobbcode.exe dist\mkobbcode-windows-x64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4.3.0
        with:
          name: mkobbcode-linux-x86_64
          path: dist/

      - name: Download Windows binary
        uses: actions/download-artifact@v4.3.0
        with:
          name: mkobbcode-windows-x64.exe
          path: dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: v${{ needs.bump-version.outputs.new_version }}
          name: v${{ needs.bump-version.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/mkobbcode-linux-x86_64
            dist/mkobbcode-windows-x64.exe